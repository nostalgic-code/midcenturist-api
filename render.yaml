services:
  - type: web
    name: midcenturist-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:8000 --timeout 600 wsgi:app
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: midcenturist-db
          property: connectionString
      - key: PAYFAST_MERCHANT_ID
        sync: false
      - key: PAYFAST_MERCHANT_KEY
        sync: false
      - key: PAYFAST_PASSPHRASE
        sync: false
      - key: PAYFAST_SANDBOX
        value: "true"
      - key: YOCO_SECRET_KEY
        sync: false
      - key: YOCO_SANDBOX
        value: "true"
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CLIENT_EMAIL
        sync: false
      - key: FROM_EMAIL
        value: noreply@midcenturist.co.za
      - key: CLOUDINARY_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://midcenturist.co.za,https://www.midcenturist.co.za,http://localhost:3000,http://localhost:3001
      - key: REDIS_URL
        sync: false

  # Uncomment this to use PostgreSQL database
  # - type: pserv
  #   name: midcenturist-db
  #   env: postgres
  #   region: oregon
  #   plan: free
  #   ipAllowList: [] # Allow all IPs (configure in production)
